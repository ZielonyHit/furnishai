<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FurnishAI Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f0e0c;
  --surface: #1a1814;
  --surface2: #232018;
  --border: rgba(255,255,255,0.07);
  --gold: #c9a84c;
  --gold2: #e8c97a;
  --cream: #f0e6d3;
  --muted: rgba(240,230,211,0.4);
  --green: #4caf7d;
  --red: #e05c5c;
}

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--cream);
  min-height: 100vh;
  font-size: 14px;
}

/* Subtle background pattern */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(201,168,76,0.08), transparent),
    radial-gradient(ellipse 40% 40% at 90% 90%, rgba(201,168,76,0.04), transparent);
  pointer-events: none;
  z-index: 0;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 36px;
  border-bottom: 1px solid var(--border);
  position: relative;
  z-index: 1;
}

.logo {
  display: flex;
  align-items: center;
  gap: 14px;
}

.logo-icon {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}

.logo-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 600;
  letter-spacing: 0.5px;
}

.logo-text span { color: var(--gold); font-style: italic; }

.header-status {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--muted);
}

.dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* LAYOUT */
.layout {
  display: grid;
  grid-template-columns: 340px 1fr;
  gap: 0;
  height: calc(100vh - 70px);
  position: relative;
  z-index: 1;
}

/* SIDEBAR */
.sidebar {
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 28px 24px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.section-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--gold);
  margin-bottom: 12px;
}

.field { margin-bottom: 14px; }

.field label {
  display: block;
  font-size: 11px;
  font-weight: 500;
  color: var(--muted);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

.field input, .field select, .field textarea {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  color: var(--cream);
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s;
  appearance: none;
}

.field input:focus, .field select:focus, .field textarea:focus {
  border-color: rgba(201,168,76,0.4);
}

.field textarea { resize: vertical; min-height: 70px; }

.field select option { background: #1a1814; }

/* Token field */
.token-row {
  display: flex;
  gap: 8px;
}
.token-row input { flex: 1; font-size: 11px; font-family: monospace; letter-spacing: 0.3px; }
.verify-btn {
  padding: 0 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--cream);
  cursor: pointer;
  font-size: 12px;
  font-family: 'Outfit', sans-serif;
  transition: all 0.15s;
  white-space: nowrap;
}
.verify-btn:hover { border-color: var(--gold); color: var(--gold); }

/* Platforms */
.platforms {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.plat-tag {
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: 100px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  user-select: none;
  color: var(--muted);
}

.plat-tag:hover { border-color: rgba(201,168,76,0.3); color: var(--cream); }
.plat-tag.on { background: rgba(201,168,76,0.12); border-color: var(--gold); color: var(--gold); }

/* Channel selector */
.channel-list { display: flex; flex-direction: column; gap: 6px; }

.channel-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.15s;
  font-size: 13px;
}

.channel-item:hover { border-color: rgba(201,168,76,0.3); }
.channel-item.selected { border-color: var(--gold); background: rgba(201,168,76,0.08); }

.channel-item .check {
  width: 16px; height: 16px;
  border: 1.5px solid var(--border);
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.15s;
  font-size: 10px;
}

.channel-item.selected .check {
  background: var(--gold);
  border-color: var(--gold);
  color: #000;
}

.channel-svc {
  font-size: 10px;
  color: var(--muted);
  margin-left: auto;
  text-transform: capitalize;
}

.no-channels {
  font-size: 12px;
  color: var(--muted);
  text-align: center;
  padding: 16px;
  border: 1px dashed var(--border);
  border-radius: 8px;
}

/* Generate button */
.gen-btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
  color: #0f0e0c;
  border: none;
  border-radius: 10px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  letter-spacing: 0.3px;
}

.gen-btn:hover:not(:disabled) {
  transform: translateY(-1px);
  box-shadow: 0 8px 24px rgba(201,168,76,0.25);
}

.gen-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.spin {
  width: 16px; height: 16px;
  border: 2px solid rgba(0,0,0,0.2);
  border-top-color: #000;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* MAIN CONTENT */
.main {
  overflow-y: auto;
  padding: 32px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.main::-webkit-scrollbar { width: 4px; }
.main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* Empty state */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  color: var(--muted);
  text-align: center;
}

.empty-icon {
  font-size: 52px;
  filter: grayscale(0.5);
  opacity: 0.5;
}

.empty-state h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px;
  color: var(--cream);
  opacity: 0.5;
}

/* Post card */
.post-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  animation: slideIn 0.35s ease;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.post-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
}

.post-platform-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 600;
  font-size: 13px;
}

.plat-icon {
  width: 28px; height: 28px;
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}

.plat-icon.instagram { background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045); }
.plat-icon.facebook { background: #1877f2; }
.plat-icon.tiktok { background: #010101; border: 1px solid rgba(255,255,255,0.15); }
.plat-icon.pinterest { background: #e60023; }
.plat-icon.linkedin { background: #0a66c2; }

.post-actions-top {
  display: flex;
  gap: 8px;
  align-items: center;
}

.post-body {
  padding: 20px;
}

.post-text {
  font-size: 14px;
  line-height: 1.75;
  color: var(--cream);
  white-space: pre-wrap;
  word-break: break-word;
  margin-bottom: 14px;
}

.hashtags-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 16px;
}

.htag {
  font-size: 12px;
  color: var(--gold);
  background: rgba(201,168,76,0.08);
  padding: 3px 10px;
  border-radius: 100px;
  border: 1px solid rgba(201,168,76,0.2);
}

.post-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  gap: 10px;
}

.btn-sm {
  padding: 7px 16px;
  border-radius: 7px;
  font-size: 12px;
  font-weight: 500;
  font-family: 'Outfit', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 6px;
}

.btn-ghost {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--cream);
}
.btn-ghost:hover { border-color: var(--gold); color: var(--gold); }
.btn-ghost.ok { border-color: var(--green); color: var(--green); }

.btn-send {
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  border: none;
  color: #0f0e0c;
  font-weight: 600;
}
.btn-send:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.btn-sent {
  background: rgba(76,175,125,0.15);
  border: 1px solid var(--green);
  color: var(--green);
}

/* Schedule time picker */
.schedule-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.schedule-row input[type="datetime-local"] {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 7px 12px;
  color: var(--cream);
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  outline: none;
  transition: border-color 0.2s;
  color-scheme: dark;
}

.schedule-row input[type="datetime-local"]:focus {
  border-color: rgba(201,168,76,0.4);
}

/* Toast */
.toast {
  position: fixed;
  bottom: 28px;
  right: 28px;
  padding: 12px 20px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 500;
  z-index: 999;
  animation: toastIn 0.3s ease;
  display: none;
}
.toast.success { background: rgba(76,175,125,0.15); border: 1px solid var(--green); color: var(--green); }
.toast.error { background: rgba(224,92,92,0.15); border: 1px solid var(--red); color: var(--red); }
@keyframes toastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* Divider */
.divider {
  height: 1px;
  background: var(--border);
  margin: 4px 0;
}

.error-inline {
  font-size: 12px;
  color: var(--red);
  margin-top: 6px;
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">🛋️</div>
    <div class="logo-text">Furnish<span>AI</span> Pro</div>
  </div>
  <div class="header-status">
    <div class="dot"></div>
    AI Marketing Assistant · Meble
  </div>
</div>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <!-- Buffer Token -->
    <div>
      <div class="section-label">🔑 Połączenie z Buffer</div>
      <div class="field">
        <label>Access Token</label>
        <div class="token-row">
          <input type="password" id="bufferToken" placeholder="Wklej swój token...">
          <button class="verify-btn" onclick="verifyToken()">Sprawdź</button>
        </div>
        <div class="error-inline" id="tokenError"></div>
      </div>

      <div>
        <div class="section-label" style="margin-bottom:10px">📡 Twoje kanały</div>
        <div class="channel-list" id="channelList">
          <div class="no-channels">Wpisz token i kliknij „Sprawdź"</div>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Post settings -->
    <div>
      <div class="section-label">✍️ Ustawienia posta</div>

      <div class="field">
        <label>Nazwa marki / sklepu</label>
        <input type="text" id="brand" value="Casa Viva Furniture" placeholder="np. Meble Kowalski">
      </div>

      <div class="field">
        <label>Kategoria mebli</label>
        <select id="category">
          <option>Salon</option>
          <option>Sypialnia</option>
          <option>Jadalnia</option>
          <option>Home Office</option>
          <option>Ogród / Taras</option>
          <option>Pokój dziecięcy</option>
          <option>Luksusowe / Premium</option>
          <option>Minimalistyczne / Skandynawskie</option>
        </select>
      </div>

      <div class="field">
        <label>Temat posta</label>
        <select id="theme">
          <option>Prezentacja produktu</option>
          <option>Inspiracja i wskazówka</option>
          <option>Promocja / Wyprzedaż</option>
          <option>Historia klienta</option>
          <option>Za kulisami</option>
          <option>Sezonowy / Świąteczny</option>
          <option>Ekologia i materiały</option>
          <option>Przed i po metamorfozie</option>
        </select>
      </div>

      <div class="field">
        <label>Ton wypowiedzi</label>
        <select id="tone">
          <option>Ciepły i zachęcający</option>
          <option>Luksusowy i aspiracyjny</option>
          <option>Zabawny i energiczny</option>
          <option>Minimalistyczny i spokojny</option>
          <option>Ekspercki i merytoryczny</option>
        </select>
      </div>

      <div class="field">
        <label>Dodatkowy kontekst (opcjonalnie)</label>
        <textarea id="context" placeholder="np. Weekend Sale: -20% na wszystkie sofy. Promocja do niedzieli."></textarea>
      </div>
    </div>

    <!-- Generate button -->
    <button class="gen-btn" id="genBtn" onclick="generatePosts()">
      <div class="spin" id="spin"></div>
      <span id="genTxt">✨ Generuj posty</span>
    </button>

  </div>

  <!-- MAIN -->
  <div class="main" id="main">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🛋️</div>
      <h2>Gotowy do działania</h2>
      <p>Połącz Buffer, wybierz kanały<br>i kliknij „Generuj posty"</p>
    </div>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
let channels = [];
let selectedChannelIds = new Set();

// ── Token verification ──────────────────────────────────────────
async function verifyToken() {
  const token = document.getElementById('bufferToken').value.trim();
  if (!token) { showTokenError('Wklej token Buffer'); return; }

  showTokenError('');
  document.getElementById('channelList').innerHTML = '<div class="no-channels">Ładowanie...</div>';

  try {
    const res = await fetch('https://api.bufferapp.com/1/profiles.json', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const data = await res.json();

    if (!Array.isArray(data) || data.error) {
      throw new Error(data.error || 'Nieprawidłowy token');
    }

    channels = data;
    renderChannels(data);
    showToast('✅ Połączono z Buffer! Znaleziono ' + data.length + ' kanałów.', 'success');
  } catch (e) {
    showTokenError('Błąd: ' + e.message);
    document.getElementById('channelList').innerHTML = '<div class="no-channels">Nie udało się połączyć</div>';
  }
}

function renderChannels(list) {
  const el = document.getElementById('channelList');
  if (!list.length) { el.innerHTML = '<div class="no-channels">Brak kanałów w koncie Buffer</div>'; return; }

  el.innerHTML = list.map(ch => `
    <div class="channel-item" id="ch-${ch.id}" onclick="toggleChannel('${ch.id}')">
      <div class="check" id="chk-${ch.id}"></div>
      <span>${ch.formatted_username || ch.service_username}</span>
      <span class="channel-svc">${svcLabel(ch.service)}</span>
    </div>
  `).join('');
}

function toggleChannel(id) {
  if (selectedChannelIds.has(id)) {
    selectedChannelIds.delete(id);
    document.getElementById('ch-' + id).classList.remove('selected');
    document.getElementById('chk-' + id).textContent = '';
  } else {
    selectedChannelIds.add(id);
    document.getElementById('ch-' + id).classList.add('selected');
    document.getElementById('chk-' + id).textContent = '✓';
  }
}

function svcLabel(svc) {
  const map = { instagram: '📸 Instagram', facebook: '👍 Facebook', tiktok: '🎵 TikTok', pinterest: '📌 Pinterest', linkedin: '💼 LinkedIn' };
  return map[svc] || svc;
}

// ── Post generation ─────────────────────────────────────────────
async function generatePosts() {
  const token = document.getElementById('bufferToken').value.trim();
  const brand = document.getElementById('brand').value.trim() || 'Meble';
  const category = document.getElementById('category').value;
  const theme = document.getElementById('theme').value;
  const tone = document.getElementById('tone').value;
  const context = document.getElementById('context').value.trim();

  if (!token) { showToast('⚠️ Wklej token Buffer i kliknij Sprawdź', 'error'); return; }
  if (selectedChannelIds.size === 0) { showToast('⚠️ Wybierz przynajmniej jeden kanał', 'error'); return; }

  const selChannels = channels.filter(c => selectedChannelIds.has(c.id));
  const platformNames = [...new Set(selChannels.map(c => c.service))];

  setLoading(true);

  const today = new Date().toLocaleDateString('pl-PL', { weekday:'long', day:'numeric', month:'long' });

  const prompt = `Jesteś profesjonalnym copywriterem social media specjalizującym się w branży meblarskiej.

Marka: ${brand}
Kategoria: ${category}
Temat posta: ${theme}
Ton: ${tone}
Platformy: ${platformNames.join(', ')}
Dzisiaj: ${today}
${context ? 'Dodatkowy kontekst: ' + context : ''}

Napisz posty dla KAŻDEJ platformy. Dostosuj styl:
- Instagram: angażujący, ~100 słów, 8-10 hashtagów
- Facebook: konwersacyjny, ~80 słów, 3-5 hashtagów  
- TikTok: krótki, energetyczny, ~50 słów, chwytliwy hook, 6 hashtagów
- Pinterest: opisowy, SEO-friendly, ~70 słów, 5 hashtagów
- LinkedIn: profesjonalny, merytoryczny, ~90 słów, 3-4 hashtagi

Odpowiedz TYLKO w formacie JSON, bez żadnego tekstu przed ani po:
{
  "posts": [
    {
      "platform": "instagram",
      "caption": "...",
      "hashtags": ["#tag1", "#tag2"]
    }
  ]
}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: 'Odpowiadaj wyłącznie poprawnym JSON bez żadnego Markdown ani komentarzy.',
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error.message);

    const raw = data.content.map(b => b.text || '').join('');
    const clean = raw.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    renderPosts(parsed.posts, selChannels);
  } catch(e) {
    showToast('❌ Błąd generowania: ' + e.message, 'error');
  } finally {
    setLoading(false);
  }
}

// ── Render posts ─────────────────────────────────────────────────
function renderPosts(posts, selChannels) {
  const main = document.getElementById('main');
  document.getElementById('emptyState')?.remove();

  // Clear old posts
  main.querySelectorAll('.post-card').forEach(el => el.remove());

  const now = new Date();
  now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
  const defaultTime = now.toISOString().slice(0,16);

  posts.forEach(post => {
    const matching = selChannels.filter(c => c.service === post.platform.toLowerCase());
    if (!matching.length) return;

    const card = document.createElement('div');
    card.className = 'post-card';

    const hashtags = (post.hashtags||[]).map(h => `<span class="htag">${h}</span>`).join('');
    const fullText = post.caption + '\n\n' + (post.hashtags||[]).join(' ');

    const channelOptions = matching.map(c =>
      `<option value="${c.id}">${c.formatted_username || c.service_username}</option>`
    ).join('');

    card.innerHTML = `
      <div class="post-header">
        <div class="post-platform-badge">
          <div class="plat-icon ${post.platform.toLowerCase()}">${platEmoji(post.platform)}</div>
          ${capFirst(post.platform)}
        </div>
        <div class="post-actions-top">
          ${matching.length > 1 ? `<select style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 10px;color:var(--cream);font-size:12px;font-family:Outfit,sans-serif;outline:none;" id="sel-${post.platform}">${channelOptions}</select>` : `<input type="hidden" id="sel-${post.platform}" value="${matching[0].id}">`}
        </div>
      </div>
      <div class="post-body">
        <div class="post-text" id="txt-${post.platform}">${escHtml(post.caption)}</div>
        ${hashtags ? `<div class="hashtags-row">${hashtags}</div>` : ''}
      </div>
      <div class="post-footer">
        <div class="schedule-row">
          <span style="font-size:11px;color:var(--muted)">📅 Zaplanuj na:</span>
          <input type="datetime-local" id="dt-${post.platform}" value="${defaultTime}">
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn-sm btn-ghost" onclick="copyText(\`${esc(fullText)}\`, this)">📋 Kopiuj</button>
          <button class="btn-sm btn-send" id="send-${post.platform}" onclick="sendToBuffer('${post.platform}', \`${esc(fullText)}\`)">
            🚀 Wyślij do Buffer
          </button>
        </div>
      </div>
    `;

    main.appendChild(card);
  });

  showToast('✅ Posty wygenerowane! Sprawdź i wyślij.', 'success');
}

// ── Send to Buffer ───────────────────────────────────────────────
async function sendToBuffer(platform, text) {
  const token = document.getElementById('bufferToken').value.trim();
  const channelId = document.getElementById('sel-' + platform)?.value;
  const dtVal = document.getElementById('dt-' + platform)?.value;
  const btn = document.getElementById('send-' + platform);

  if (!channelId) { showToast('Wybierz kanał', 'error'); return; }

  btn.disabled = true;
  btn.textContent = '⏳ Wysyłanie...';

  try {
    let body = `text=${encodeURIComponent(text)}&profile_ids[]=${encodeURIComponent(channelId)}&access_token=${encodeURIComponent(token)}`;

    if (dtVal) {
      const ts = Math.floor(new Date(dtVal).getTime() / 1000);
      body += `&scheduled_at=${ts}&nowOrSchedule=scheduled`;
    } else {
      body += `&nowOrSchedule=queue`;
    }

    const res = await fetch('https://api.bufferapp.com/1/updates/create.json', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body
    });

    const data = await res.json();

    if (data.success || data.update) {
      btn.className = 'btn-sm btn-sent';
      btn.textContent = '✅ Wysłano!';
      btn.disabled = true;
      showToast('🎉 Post dodany do kolejki Buffer!', 'success');
    } else {
      throw new Error(data.message || JSON.stringify(data));
    }
  } catch(e) {
    btn.disabled = false;
    btn.className = 'btn-sm btn-send';
    btn.textContent = '🚀 Wyślij do Buffer';
    showToast('❌ Błąd: ' + e.message, 'error');
  }
}

// ── Utilities ────────────────────────────────────────────────────
async function copyText(text, btn) {
  await navigator.clipboard.writeText(text);
  btn.className = 'btn-sm btn-ghost ok';
  btn.textContent = '✓ Skopiowano';
  setTimeout(() => { btn.className = 'btn-sm btn-ghost'; btn.textContent = '📋 Kopiuj'; }, 2000);
}

function platEmoji(p) {
  return { instagram:'📸', facebook:'👍', tiktok:'🎵', pinterest:'📌', linkedin:'💼' }[p.toLowerCase()] || '📣';
}

function capFirst(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function esc(s) { return s.replace(/`/g,'\\`').replace(/\$/g,'\\$').replace(/\\/g,'\\\\'); }

function setLoading(v) {
  document.getElementById('genBtn').disabled = v;
  document.getElementById('spin').style.display = v ? 'block' : 'none';
  document.getElementById('genTxt').textContent = v ? 'Generuję...' : '✨ Generuj posty';
}

function showTokenError(msg) {
  document.getElementById('tokenError').textContent = msg;
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type;
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 4000);
}
</script>
</body>
</html>
